<svg width="1700" height="980" viewBox="0 0 1700 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Talking BI workflow diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1700" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="0.5" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#052E2B"/>
    </linearGradient>
    <linearGradient id="stepA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="stepB" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="stepC" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="stepD" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FDA4AF"/>
      <stop offset="1" stop-color="#E11D48"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.22"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0 0L10 4L0 8V0Z" fill="#E2E8F0"/>
    </marker>
  </defs>

  <rect width="1700" height="980" fill="url(#bg)"/>
  <circle cx="1580" cy="120" r="180" fill="#22D3EE" opacity="0.1"/>
  <circle cx="120" cy="880" r="220" fill="#86EFAC" opacity="0.1"/>

  <text x="850" y="70" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="700" fill="#F8FAFC">Talking BI - KPI to Dashboard Workflow</text>
  <text x="850" y="106" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#CBD5E1">Dual-mode pipeline: URL Dataset Agent Flow + CSV Fallback Flow</text>

  <g filter="url(#shadow)">
    <rect x="80" y="180" rx="20" ry="20" width="260" height="120" fill="url(#stepA)"/>
    <text x="210" y="228" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#EFF6FF">1. User KPI</text>
    <text x="210" y="258" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#DBEAFE">Prompt + chart/theme prefs</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="400" y="180" rx="20" ry="20" width="310" height="120" fill="url(#stepA)"/>
    <text x="555" y="228" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#EFF6FF">2. Frontend API Call</text>
    <text x="555" y="258" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#DBEAFE">POST /gen-dashboard</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="770" y="180" rx="20" ry="20" width="340" height="120" fill="url(#stepB)"/>
    <text x="940" y="228" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#ECFDF5">3. FastAPI Router</text>
    <text x="940" y="258" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#D1FAE5">Select URL mode or CSV fallback</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1170" y="180" rx="20" ry="20" width="430" height="120" fill="url(#stepC)"/>
    <text x="1385" y="228" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#1F2937">4. Decision</text>
    <text x="1385" y="258" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#374151">use_url_dataset && session/user present?</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1010" y="390" rx="20" ry="20" width="270" height="105" fill="url(#stepB)"/>
    <text x="1145" y="432" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#ECFDF5">YES PATH</text>
    <text x="1145" y="460" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#D1FAE5">Dynamic dataset pipeline</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1320" y="390" rx="20" ry="20" width="270" height="105" fill="url(#stepC)"/>
    <text x="1455" y="432" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#1F2937">NO PATH</text>
    <text x="1455" y="460" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#374151">CSV fallback pipeline</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="640" y="550" rx="18" ry="18" width="220" height="95" fill="url(#stepB)"/>
    <text x="750" y="588" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ECFDF5">5A SQL Agent</text>
    <text x="750" y="615" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#D1FAE5">KPI query planning</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="900" y="550" rx="18" ry="18" width="220" height="95" fill="url(#stepB)"/>
    <text x="1010" y="588" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ECFDF5">5B DeepPrep</text>
    <text x="1010" y="615" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#D1FAE5">Clean + normalize rows</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1160" y="550" rx="18" ry="18" width="220" height="95" fill="url(#stepB)"/>
    <text x="1270" y="588" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ECFDF5">5C Doc2Chart</text>
    <text x="1270" y="615" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#D1FAE5">Chart slots + layout</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1420" y="550" rx="18" ry="18" width="220" height="95" fill="url(#stepB)"/>
    <text x="1530" y="588" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ECFDF5">5D Insights</text>
    <text x="1530" y="615" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#D1FAE5">Narrative generation</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1280" y="690" rx="18" ry="18" width="300" height="105" fill="url(#stepC)"/>
    <text x="1430" y="732" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#1F2937">5N CSV Aggregate</text>
    <text x="1430" y="760" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#374151">prepare_aggregated_rows + AI spec</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="620" y="820" rx="20" ry="20" width="460" height="115" fill="url(#stepD)"/>
    <text x="850" y="865" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="700" fill="#FFF1F2">6. Dashboard Rendering</text>
    <text x="850" y="895" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#FFE4E6">buildDashboards + themes + chart components</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1120" y="820" rx="20" ry="20" width="520" height="115" fill="url(#stepD)"/>
    <text x="1380" y="865" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="700" fill="#FFF1F2">7. Optional Extensions</text>
    <text x="1380" y="895" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#FFE4E6">/voice-explanation + /bi-chat + conversation save</text>
  </g>

  <line x1="340" y1="240" x2="400" y2="240" stroke="#E2E8F0" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="710" y1="240" x2="770" y2="240" stroke="#E2E8F0" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1110" y1="240" x2="1170" y2="240" stroke="#E2E8F0" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M1385 300 C1385 350, 1145 350, 1145 390" stroke="#E2E8F0" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M1385 300 C1385 350, 1455 350, 1455 390" stroke="#E2E8F0" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <line x1="1145" y1="495" x2="750" y2="550" stroke="#E2E8F0" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="860" y1="597" x2="900" y2="597" stroke="#E2E8F0" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1120" y1="597" x2="1160" y2="597" stroke="#E2E8F0" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1380" y1="597" x2="1420" y2="597" stroke="#E2E8F0" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M1530 645 C1530 735, 960 735, 960 820" stroke="#E2E8F0" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M1455 495 C1455 580, 1430 610, 1430 690" stroke="#E2E8F0" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M1430 795 C1430 810, 1050 810, 1050 845" stroke="#E2E8F0" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <line x1="1080" y1="878" x2="1120" y2="878" stroke="#E2E8F0" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="1120" y="371" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#D1FAE5">URL dataset available</text>
  <text x="1452" y="371" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#FDE68A">Fallback to CSV</text>

  <rect x="70" y="930" width="1560" height="34" rx="10" fill="#0F172A" opacity="0.85"/>
  <text x="850" y="953" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#93C5FD">Key outputs: dashboard spec, insights, BI chat responses, and voice-ready narratives.</text>
</svg>
